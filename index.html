<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
        body { background-color: #0d0c0a !important; color: #f2f2f2; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; text-align: center; padding: 20px; position: relative; }
        
        /* BOKEH BACKGROUND */
        .bokeh-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .bubble { position: absolute; background: radial-gradient(circle, rgba(245, 235, 215, 0.14) 0%, rgba(245, 235, 215, 0) 70%); border-radius: 50%; filter: blur(8px); animation: floatUp 12s infinite ease-in-out; }
        .bubble:nth-child(1) { width: 140px; height: 140px; left: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 220px; height: 220px; left: 60%; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 90px; height: 90px; left: 40%; animation-delay: 4s; }
        @keyframes floatUp { 0% { transform: translateY(110vh); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }

        .container { position: relative; z-index: 2; max-width: 450px; width: 100%; }
        .page { display: none; animation: fadeIn 1s ease-in-out forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { font-size: 1.6rem; color: #f7f4eb; margin-bottom: 10px; }
        .subtitle { font-size: 0.75rem; color: #a8a090; margin-bottom: 20px; letter-spacing: 3px; text-transform: uppercase; }
        
        .btn { background: transparent; color: #dfba73; border: 1px solid #dfba73; padding: 10px 25px; cursor: pointer; margin-top: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { background: #dfba73; color: #0d0c0a; }

        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .clickable-img { width: 100%; height: 150px; object-fit: cover; filter: grayscale(100%); cursor: pointer; border: 1px solid #333; transition: 0.4s; }
        .clickable-img:hover { filter: grayscale(0%); transform: scale(1.05); }
        
        #messageBox { margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid #dfba73; color: #fff; display: none; font-style: italic; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="bokeh-bg">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div class="container">
        <!-- Halaman 1 -->
        <div class="page active" id="page1">
            <p class="subtitle">PREPARING SOMETHING</p>
            <h1>Untuk Seseorang yang Spesial</h1>
            <button class="btn" onclick="nextPage(2)">LET IT BEGIN</button>
        </div>

        <!-- Halaman 2: Galeri Interaktif -->
        <div class="page" id="page2">
            <p class="subtitle">ALL ABOUT YOU</p>
            <p>Klik foto di bawah untuk membaca isi hatiku:</p>
            <div class="photo-grid">
                <img src="https://lh3.googleusercontent.com/d/1Y-blUCLnKi5g60rHD5fimV95lcya7EX9" class="clickable-img" onclick="showMessage('Hangat saat pertama kali bertemu. Di antara 8 miliar manusia, aku tidak menyangka takdir menuntunku padamu. Aku sangat beruntung memilikimu, kamu adalah anugerah terindah yang pernah kumiliki.🤍')">
                <img src="https://lh3.googleusercontent.com/d/1h_rYFcn0xHd31oAvDxr6KegfItuTTcBH" class="clickable-img" onclick="showMessage('Kamu adalah warna baru dalam hidupku yang kelabu. Terima kasih telah mengajarkanku hal-hal yang sebelumnya tak kupahami, membuat hari-hariku jauh lebih bermakna. Bersamamu, dunia terasa jauh lebih indah.')">
                <img src="https://lh3.googleusercontent.com/d/1toVqltCDJ4UYwG_PTsiaU2gJKA5sQSPj" class="clickable-img" onclick="showMessage('Aku selalu suka mendengar ceritamu tentang apa pun. Semangatmu, tawamu, bahkan rasa kesal dan sedihmu, semuanya terasa nyata di hatiku. Aku akan selalu menjadi pendengar setiamu dalam kondisi apa pun.')">
                <img src="https://lh3.googleusercontent.com/d/1lfN644wSMf_FcAsOoa5vVsrRNUVkEF06" class="clickable-img" onclick="showMessage('Jadilah dirimu sendiri di depanku. Aku tidak akan pernah menghakimimu. Jangan ada gengsi di antara kita, karena dalam suka maupun duka, aku akan selalu ada tepat di sampingmu untuk menggenggam tanganmu.')">
            </div>
            <div id="messageBox"></div>
            <button class="btn" onclick="nextPage(3)">NEXT</button>
        </div>

        <!-- Halaman 3: Penutup -->
        <div class="page" id="page3">
            <h1>Terima kasih sudah hadir di hidupku ❤️</h1>
            <button class="btn" onclick="alert('I love you!')">FINISH</button>
        </div>
    </div>

    <script>
        function nextPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + n).classList.add('active');
        }
        function showMessage(msg) {
            const box = document.getElementById('messageBox');
            box.innerText = msg;
            box.style.display = 'block';
        }
    </script>
</body>
</html>
