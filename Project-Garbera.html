<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Gerbera 🌼</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Georgia', serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f0f;
      color:#fff;
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:20px;
      max-width:500px;
    }

    .flower{
      font-size:4rem;
      animation: float 3s ease-in-out infinite;
    }

    h1{
      margin-top:20px;
      font-size:2.2rem;
      letter-spacing:1px;
    }

    p{
      margin-top:15px;
      color:#d8d8d8;
      line-height:1.6;
      font-size:1rem;
    }

    button{
      margin-top:30px;
      padding:14px 28px;
      border:none;
      border-radius:999px;
      background:#f6d8d8;
      color:#222;
      font-size:1rem;
      cursor:pointer;
      transition:all .3s ease;
    }

    button:hover{
      transform:scale(1.05);
      background:#ffeaea;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="flower">🌼</div>
    <h1>Project Gerbera</h1>
    <p>
      Sebuah tempat kecil yang dibuat khusus untuk satu orang.
      <br />
      Dan ini baru permulaannya.
    </p>

    <button onclick="startJourney()">
      Enter the Garden ✨
    </button>
  </div>

  <script>
    function startJourney(){
      document.body.innerHTML = `
        <div style="height:100vh;display:flex;justify-content:center;align-items:center;background:#000;color:#fff;text-align:center;padding:20px;">
          <div>
            <div style="font-size:3rem;margin-bottom:20px;">🌙</div>
            <div style="font-size:1.5rem;line-height:1.8;">
              hey...<br>
              aku punya sesuatu buat kamu.<br>
              bukan hadiah yang mahal.<br>
              tapi aku buat ini khusus buat kamu.
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
